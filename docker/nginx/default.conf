# Configuracion de Nginx para el proyecto Laravel
# Nginx actua como servidor web y proxy inverso
# Redirige las peticiones PHP al contenedor de PHP-FPM

server {
    # Puerto donde escucha el servidor
    listen 80;
    server_name localhost;

    # Directorio raiz donde Laravel sirve los archivos publicos
    root /var/www/html/public;
    index index.php index.html;

    # Manejo de las rutas de Laravel
    # Intenta servir el archivo directamente, si no existe lo manda a index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Configuracion para procesar archivos PHP
    # Envia las peticiones PHP al contenedor app (PHP-FPM) en el puerto 9000
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
